<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Lista duplamente encadeada</title>
  <desc id="desc">Nós conectados por setas para frente e para trás.</desc>
