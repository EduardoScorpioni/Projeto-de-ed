<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de estruturas de dados</title>
  <desc id="desc">Um mapa com TAD no centro conectado a listas, vetores, pilhas e filas.</desc>
  <rect width="900" height="520" fill="#ffffff"/>
  <rect x="42" y="42" width="816" height="436" rx="8" fill="#ecf2ed" stroke="#d8ddd4"/>
  <g fill="none" stroke="#5c685f" stroke-width="4" stroke-linecap="round">
    <path d="M450 180 L238 118"/>
    <path d="M450 180 L662 118"/>
    <path d="M450 300 L238 382"/>
    <path d="M450 300 L662 382"/>
    <path d="M450 180 L450 300"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="330" y="170" width="240" height="150" rx="8" fill="#18201d"/>
    <text x="450" y="238" fill="#ffffff" font-size="34" font-weight="800">TAD</text>
    <text x="450" y="272" fill="#b7d8c5" font-size="18">contrato + operações</text>

    <rect x="106" y="70" width="264" height="96" rx="8" fill="#ffffff" stroke="#2f7d5a" stroke-width="3"/>
    <text x="238" y="112" fill="#18201d" font-size="24" font-weight="800">Lista simples</text>
    <text x="238" y="140" fill="#5c685f" font-size="16">um ponteiro por nó</text>

    <rect x="530" y="70" width="264" height="96" rx="8" fill="#ffffff" stroke="#2e5e8c" stroke-width="3"/>
    <text x="662" y="112" fill="#18201d" font-size="24" font-weight="800">Lista dupla</text>
    <text x="662" y="140" fill="#5c685f" font-size="16">anterior e próximo</text>

    <rect x="106" y="340" width="264" height="96" rx="8" fill="#ffffff" stroke="#c4782b" stroke-width="3"/>
    <text x="238" y="382" fill="#18201d" font-size="24" font-weight="800">Código C#</text>
    <text x="238" y="410" fill="#5c685f" font-size="16">classes e metodos</text>

    <rect x="530" y="340" width="264" height="96" rx="8" fill="#ffffff" stroke="#b84a4a" stroke-width="3"/>
    <text x="662" y="382" fill="#18201d" font-size="24" font-weight="800">Midias</text>
    <text x="662" y="410" fill="#5c685f" font-size="16">diagramas, gifs, videos</text>
  </g>
</svg>
