      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#168c7a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#168c7a"/>
  <rect y="1112" width="1600" height="18" fill="#168c7a"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#168c7a" font-weight="700"><tspan x="90" dy="0">INSERÇÃO NO INÍCIO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Operação rápida</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">Inserir no início é O(1), porque não precisa percorrer a lista inteira.</tspan></text>
  
       
       
    <g class="card">
      <rect x="90" y="320" width="1000" height="520" rx="20" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <g style="--accent:#168c7a">
    <text x="225" y="487" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#168c7a" font-weight="800" text-anchor="middle"><tspan x="225" dy="0">novo</tspan></text>
    <rect x="155" y="532" width="145" height="96" rx="18" fill="#e9f7f4" stroke="#168c7a" stroke-width="3"/>
    <text x="211.5" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="211.5" dy="0">5</tspan></text>
    <line x1="255" y1="548" x2="255" y2="612" stroke="#d8e1ea" stroke-width="2"/>
       <text x="278" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="278" dy="0">prox</tspan></text>
    <line x1="300" y1="580" x2="365" y2="580" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
    <rect x="380" y="532" width="145" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="436.5" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="436.5" dy="0">10</tspan></text>
    <line x1="480" y1="548" x2="480" y2="612" stroke="#d8e1ea" stroke-width="2"/>
       <text x="503" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="503" dy="0">prox</tspan></text>
        <line x1="525" y1="580" x2="578" y2="580" stroke="#5b6b7b" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-muted)"/><rect x="595" y="532" width="145" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="651.5" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="651.5" dy="0">20</tspan></text>
    <line x1="695" y1="548" x2="695" y2="612" stroke="#d8e1ea" stroke-width="2"/>
       <text x="718" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="718" dy="0">prox</tspan></text>
        
    <text x="165" y="692" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="165" dy="0">novo.Prox recebe o antigo início</tspan></text>
  </g>
    </g>
    
    <g class="card">
      <rect x="1160" y="340" width="350" height="210" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1160" y="340" width="12" height="210" rx="6" fill="#168c7a"/>
      
      <text x="1196" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#172331" font-weight="800"><tspan x="1196" dy="0">Passo essencial</tspan></text>
      <text x="1196" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="1196" dy="0">O novo nó aponta para o</tspan><tspan x="1196" dy="26.88">antigo início. Depois,</tspan><tspan x="1196" dy="26.88">início passa a apontar</tspan><tspan x="1196" dy="26.88">para o novo nó.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1160" y="590" width="350" height="210" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1160" y="590" width="12" height="210" rx="6" fill="#168c7a"/>
      
      <text x="1196" y="644" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#172331" font-weight="800"><tspan x="1196" dy="0">Lista vazia</tspan></text>
      <text x="1196" y="702" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="1196" dy="0">Se a lista estava vazia,</tspan><tspan x="1196" dy="26.88">início e fim passam a</tspan><tspan x="1196" dy="26.88">apontar para o novo nó.</tspan></text>
    </g>
  
  
       
       
       
       
    <line x1="90" y1="1044" x2="1510" y2="1044" stroke="#d8e1ea" stroke-width="2"/>
