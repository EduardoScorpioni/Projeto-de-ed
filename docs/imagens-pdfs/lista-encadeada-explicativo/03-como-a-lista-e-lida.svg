<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Como a lista é lida">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#168c7a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#168c7a"/>
  <rect y="1112" width="1600" height="18" fill="#168c7a"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#168c7a" font-weight="700"><tspan x="90" dy="0">PERCURSO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Como a lista é lida</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">Para buscar um valor, o algoritmo começa no início e avança pelo ponteiro prox.</tspan></text>
  
       
       
       
       
    <g class="card">
      <rect x="90" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="90" y="390" width="12" height="360" rx="6" fill="#168c7a"/>
      <circle cx="361" cy="438" r="24" fill="#e9f7f4" stroke="#168c7a" stroke-width="2"/>
       <text x="361" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#168c7a" font-weight="800" text-anchor="middle"><tspan x="361" dy="0">1</tspan></text>
      <text x="126" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="126" dy="0">1. Começa</tspan></text>
      <text x="126" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="126" dy="0">Use uma variável</tspan><tspan x="126" dy="29.44">auxiliar apontando</tspan><tspan x="126" dy="29.44">para o primeiro nó.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="455" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="455" y="390" width="12" height="360" rx="6" fill="#168c7a"/>
      <circle cx="726" cy="438" r="24" fill="#e9f7f4" stroke="#168c7a" stroke-width="2"/>
       <text x="726" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#168c7a" font-weight="800" text-anchor="middle"><tspan x="726" dy="0">2</tspan></text>
      <text x="491" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="491" dy="0">2. Compara</tspan></text>
      <text x="491" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="491" dy="0">Verifique se o valor</tspan><tspan x="491" dy="29.44">do nó atual é o valor</tspan><tspan x="491" dy="29.44">procurado.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="820" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="820" y="390" width="12" height="360" rx="6" fill="#168c7a"/>
      <circle cx="1091" cy="438" r="24" fill="#e9f7f4" stroke="#168c7a" stroke-width="2"/>
       <text x="1091" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#168c7a" font-weight="800" text-anchor="middle"><tspan x="1091" dy="0">3</tspan></text>
      <text x="856" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="856" dy="0">3. Avança</tspan></text>
      <text x="856" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="856" dy="0">Se não encontrou,</tspan><tspan x="856" dy="29.44">faça atual =</tspan><tspan x="856" dy="29.44">atual.prox.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1185" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1185" y="390" width="12" height="360" rx="6" fill="#168c7a"/>
      <circle cx="1456" cy="438" r="24" fill="#e9f7f4" stroke="#168c7a" stroke-width="2"/>
       <text x="1456" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#168c7a" font-weight="800" text-anchor="middle"><tspan x="1456" dy="0">4</tspan></text>
      <text x="1221" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="1221" dy="0">4. Para</tspan></text>
      <text x="1221" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="1221" dy="0">A busca termina ao</tspan><tspan x="1221" dy="29.44">encontrar o valor ou</tspan><tspan x="1221" dy="29.44">ao chegar em null.</tspan></text>
    </g>
  
       
       
    <line x1="90" y1="1044" x2="1510" y2="1044" stroke="#d8e1ea" stroke-width="2"/>
    <text x="90" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="90" dy="0">A busca é sequencial: no pior caso visita todos os nós.</tspan></text>
    <text x="1510" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">03 / 07</tspan></text>
  
</svg>