        <line x1="590" y1="580" x2="655" y2="580" stroke="#5b6b7b" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-muted)"/><rect x="675" y="532" width="145" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="731.5" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="731.5" dy="0">C</tspan></text>
    <line x1="775" y1="548" x2="775" y2="612" stroke="#d8e1ea" stroke-width="2"/>
