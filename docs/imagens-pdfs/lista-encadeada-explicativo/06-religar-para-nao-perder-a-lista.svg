    <text x="517" y="484" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#c94f45" font-weight="900" text-anchor="middle"><tspan x="517" dy="0">remover B</tspan></text>
    <line x1="290" y1="702" x2="645" y2="702" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
    <text x="467" y="744" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#168c7a" font-weight="800" text-anchor="middle"><tspan x="467" dy="0">A.Prox aponta para C</tspan></text>
  </g>
    </g>
    
    <g class="card">
      <rect x="1160" y="340" width="350" height="210" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1160" y="340" width="12" height="210" rx="6" fill="#168c7a"/>
      
      <text x="1196" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#172331" font-weight="800"><tspan x="1196" dy="0">Antes</tspan></text>
      <text x="1196" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="1196" dy="0">A aponta para B e B</tspan><tspan x="1196" dy="26.88">aponta para C.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1160" y="590" width="350" height="210" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1160" y="590" width="12" height="210" rx="6" fill="#168c7a"/>
      
      <text x="1196" y="644" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#172331" font-weight="800"><tspan x="1196" dy="0">Depois</tspan></text>
      <text x="1196" y="702" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="1196" dy="0">A passa a apontar direto</tspan><tspan x="1196" dy="26.88">para C. O nó B sai da</tspan><tspan x="1196" dy="26.88">sequência.</tspan></text>
