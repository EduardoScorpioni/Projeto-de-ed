<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Religar para não perder a lista">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#168c7a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#168c7a"/>
  <rect y="1112" width="1600" height="18" fill="#168c7a"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#168c7a" font-weight="700"><tspan x="90" dy="0">REMOÇÃO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Religar para não perder a lista</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">Ao remover um nó, o anterior precisa apontar para o próximo do removido.</tspan></text>
  
       
       
    <g class="card">
      <rect x="90" y="320" width="1000" height="520" rx="20" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <g style="--accent:#168c7a">
    <rect x="215" y="532" width="145" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="271.5" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="271.5" dy="0">A</tspan></text>
    <line x1="315" y1="548" x2="315" y2="612" stroke="#d8e1ea" stroke-width="2"/>
       <text x="338" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="338" dy="0">prox</tspan></text>
        <line x1="360" y1="580" x2="425" y2="580" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-accent)"/><rect x="445" y="532" width="145" height="96" rx="18" fill="#e9f7f4" stroke="#168c7a" stroke-width="3"/>
    <text x="501.5" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="501.5" dy="0">B</tspan></text>
    <line x1="545" y1="548" x2="545" y2="612" stroke="#d8e1ea" stroke-width="2"/>
