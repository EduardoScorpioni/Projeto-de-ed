<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Fluxo básico em C#">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d5d94"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#1d5d94"/>
  <rect y="1112" width="1600" height="18" fill="#1d5d94"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#1d5d94" font-weight="700"><tspan x="90" dy="0">CÓDIGO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Fluxo básico em C#</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">Declarar o tipo, preencher os dados e chamar uma operação do próprio TAD.</tspan></text>
  
       
       
       
    
    <g class="card">
      <rect x="90" y="315" width="950" height="625" rx="20" fill="#18222f"/>
      <rect x="90" y="315" width="950" height="76" rx="20" fill="#1d5d94"/>
      <rect x="90" y="361" width="950" height="30" fill="#1d5d94"/>
      <text x="124" y="363" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#ffffff" font-weight="800"><tspan x="124" dy="0">Struct Cliente</tspan></text>
      <rect x="114" y="410" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="431" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">public struct Cliente</tspan></text><text x="128" y="461.45" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">{</tspan></text><rect x="114" y="470.9" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="491.9" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">public string Nome;</tspan></text><text x="128" y="522.35" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">public string CPF;</tspan></text><rect x="114" y="531.8" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="552.8" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"></text><text x="128" y="583.25" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">public Cliente(string nome, string cpf)</tspan></text><rect x="114" y="592.7" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="613.7" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">{</tspan></text><text x="128" y="644.15" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">Nome = nome;</tspan></text><rect x="114" y="653.6" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="674.6" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">CPF = cpf;</tspan></text><text x="128" y="705.05" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">}</tspan></text><rect x="114" y="714.5" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="735.5" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"></text><text x="128" y="765.95" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">public void Imprimir()</tspan></text><rect x="114" y="775.4" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="796.4" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">{</tspan></text><text x="128" y="826.8499999999999" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">Console.WriteLine($&quot;Nome: {Nome}&quot;);</tspan></text><rect x="114" y="836.3" width="902" height="34.45" rx="6" fill="#263445" opacity=".72"/><text x="128" y="857.3" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">Console.WriteLine($&quot;CPF: {CPF}&quot;);</tspan></text><text x="128" y="887.75" font-family="Consolas, Menlo, monospace" font-size="21" fill="#eef6ff"><tspan x="128" dy="0">}</tspan></text>
    </g>
  
    
    <g class="card">
      <rect x="1110" y="345" width="400" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1110" y="345" width="12" height="220" rx="6" fill="#1d5d94"/>
      
      <text x="1146" y="399" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#172331" font-weight="800"><tspan x="1146" dy="0">Leitura</tspan></text>
      <text x="1146" y="457" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b"><tspan x="1146" dy="0">Cliente é o tipo. A variável</tspan><tspan x="1146" dy="28.16">cliente guarda os dados de</tspan><tspan x="1146" dy="28.16">uma pessoa e chama</tspan><tspan x="1146" dy="28.16">Imprimir() para exibi-los.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1110" y="610" width="400" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1110" y="610" width="12" height="220" rx="6" fill="#1d5d94"/>
      
      <text x="1146" y="664" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#172331" font-weight="800"><tspan x="1146" dy="0">Correção</tspan></text>
      <text x="1146" y="722" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b"><tspan x="1146" dy="0">O construtor garante que os</tspan><tspan x="1146" dy="28.16">campos principais recebam</tspan><tspan x="1146" dy="28.16">valor antes do uso.</tspan></text>
    </g>
  
  
       
       
       
    <line x1="90" y1="1044" x2="1510" y2="1044" stroke="#d8e1ea" stroke-width="2"/>
    <text x="90" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="90" dy="0">Declarar -&gt; preencher -&gt; executar operação.</tspan></text>
    <text x="1510" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">05 / 06</tspan></text>
  
</svg>