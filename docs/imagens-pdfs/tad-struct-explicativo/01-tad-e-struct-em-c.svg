      <text x="611" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="611" dy="0">Por que usar</tspan></text>
      <text x="611" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="611" dy="0">Ajuda a separar o</tspan><tspan x="611" dy="29.44">comportamento esperado dos</tspan><tspan x="611" dy="29.44">detalhes internos da</tspan><tspan x="611" dy="29.44">implementação.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1060" y="720" width="430" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
