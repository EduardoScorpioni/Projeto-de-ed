    <text x="94" y="386" font-family="Segoe UI, Arial, sans-serif" font-size="31" fill="#5b6b7b"><tspan x="94" dy="0">Resumo visual para explicar Tipo Abstrato de Dados e o</tspan><tspan x="94" dy="39.68">uso de struct como modelo simples.</tspan></text>
