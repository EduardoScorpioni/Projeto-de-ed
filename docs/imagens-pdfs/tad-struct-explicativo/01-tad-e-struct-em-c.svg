      <text x="1096" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="1096" dy="0">No projeto</tspan></text>
      <text x="1096" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="1096" dy="0">Use como material de apoio</tspan><tspan x="1096" dy="29.44">para explicar conceitos antes</tspan><tspan x="1096" dy="29.44">dos exemplos de código.</tspan></text>
    </g>
  
  
