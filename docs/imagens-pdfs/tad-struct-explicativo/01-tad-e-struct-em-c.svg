      <text x="126" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="126" dy="0">Ideia central</tspan></text>
      <text x="126" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="126" dy="0">Um TAD define quais dados</tspan><tspan x="126" dy="29.44">existem e quais operações</tspan><tspan x="126" dy="29.44">podem ser feitas sobre eles.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="575" y="720" width="430" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
