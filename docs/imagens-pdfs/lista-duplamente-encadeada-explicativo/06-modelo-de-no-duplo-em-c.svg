      <rect x="114" y="408" width="902" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="431" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">public class NoDuplo</tspan></text><text x="128" y="464.35" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">{</tspan></text><rect x="114" y="474.7" width="902" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="497.7" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">public int Valor;</tspan></text><text x="128" y="531.05" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">public NoDuplo Anterior;</tspan></text><rect x="114" y="541.4" width="902" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="564.4" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">public NoDuplo Proximo;</tspan></text><text x="128" y="597.75" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"></text><rect x="114" y="608.1" width="902" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="631.1" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">public NoDuplo(int valor)</tspan></text><text x="128" y="664.45" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">{</tspan></text><rect x="114" y="674.8" width="902" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="697.8" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">Valor = valor;</tspan></text><text x="128" y="731.1500000000001" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">Anterior = null;</tspan></text><rect x="114" y="741.5" width="902" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="764.5" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">Proximo = null;</tspan></text><text x="128" y="797.85" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">}</tspan></text><rect x="114" y="808.2" width="902" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="831.2" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">}</tspan></text>
