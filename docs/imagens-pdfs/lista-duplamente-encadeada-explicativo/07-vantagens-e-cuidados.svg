<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Vantagens e cuidados">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#d8891f"/>
  <rect y="1112" width="1600" height="18" fill="#d8891f"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d8891f" font-weight="700"><tspan x="90" dy="0">RESUMO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Vantagens e cuidados</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">A lista dupla é flexível, mas exige atenção porque cada alteração mexe em mais referências.</tspan></text>
  
       
    <g class="card">
      <rect x="90" y="340" width="650" height="225" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="90" y="340" width="12" height="225" rx="6" fill="#d8891f"/>
      
      <text x="126" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="126" dy="0">Vantagens</tspan></text>
      <text x="126" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#5b6b7b"><tspan x="126" dy="0">Percorre para frente e para trás. Facilita</tspan><tspan x="126" dy="30.72">remoções quando o nó já é conhecido.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="810" y="340" width="650" height="225" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="810" y="340" width="12" height="225" rx="6" fill="#d8891f"/>
      
      <text x="846" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="846" dy="0">Cuidados</tspan></text>
      <text x="846" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#5b6b7b"><tspan x="846" dy="0">Usa mais memória que a lista simples por</tspan><tspan x="846" dy="30.72">guardar duas referências em cada nó.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="90" y="605" width="650" height="225" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="90" y="605" width="12" height="225" rx="6" fill="#d8891f"/>
      
      <text x="126" y="659" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="126" dy="0">Erros comuns</tspan></text>
      <text x="126" y="717" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#5b6b7b"><tspan x="126" dy="0">Atualizar só um lado da ligação, esquecer null</tspan><tspan x="126" dy="30.72">nos extremos ou não ajustar início e fim.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="810" y="605" width="650" height="225" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="810" y="605" width="12" height="225" rx="6" fill="#d8891f"/>
      
      <text x="846" y="659" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="846" dy="0">Como explicar</tspan></text>
      <text x="846" y="717" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#5b6b7b"><tspan x="846" dy="0">Mostre sempre os ponteiros antes e depois da</tspan><tspan x="846" dy="30.72">operação.</tspan></text>
    </g>
  
       
       
       
       
       
    <line x1="90" y1="1044" x2="1510" y2="1044" stroke="#d8e1ea" stroke-width="2"/>
    <text x="90" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="90" dy="0">Mais flexibilidade, mais responsabilidade na manutenção dos ponteiros.</tspan></text>
    <text x="1510" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">07 / 07</tspan></text>
  
</svg>