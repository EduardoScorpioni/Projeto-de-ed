<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Como remover sem quebrar a lista">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#d8891f"/>
  <rect y="1112" width="1600" height="18" fill="#d8891f"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d8891f" font-weight="700"><tspan x="90" dy="0">REMOÇÃO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Como remover sem quebrar a lista</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">Para remover um nó, conecte o anterior ao próximo e o próximo ao anterior.</tspan></text>
  
       
       
    <g class="card">
      <rect x="90" y="320" width="1000" height="520" rx="20" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <g style="--accent:#d8891f">
    
    <rect x="195" y="532" width="160" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="259" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="259" dy="0">A</tspan></text>
    <line x1="310" y1="548" x2="310" y2="612" stroke="#d8e1ea" stroke-width="2"/>
       <text x="333" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="333" dy="0">ant | prox</tspan></text>
        <line x1="355" y1="566" x2="423" y2="566" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
        <line x1="423" y1="596" x2="355" y2="596" stroke="#5b6b7b" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-amber)"/><rect x="440" y="532" width="160" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="504" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="504" dy="0">B</tspan></text>
    <line x1="555" y1="548" x2="555" y2="612" stroke="#d8e1ea" stroke-width="2"/>
       <text x="578" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="578" dy="0">ant | prox</tspan></text>
        <line x1="600" y1="566" x2="668" y2="566" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
        <line x1="668" y1="596" x2="600" y2="596" stroke="#5b6b7b" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-amber)"/><rect x="685" y="532" width="160" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="749" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="749" dy="0">C</tspan></text>
    <line x1="800" y1="548" x2="800" y2="612" stroke="#d8e1ea" stroke-width="2"/>
       <text x="823" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="823" dy="0">ant | prox</tspan></text>
        
    <text x="475" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#d8891f" font-weight="800" text-anchor="middle"><tspan x="475" dy="0">próximo</tspan></text>
    <text x="475" y="677" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#d8891f" font-weight="800" text-anchor="middle"><tspan x="475" dy="0">anterior</tspan></text>
  
    <text x="520" y="474" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#c94f45" font-weight="900" text-anchor="middle"><tspan x="520" dy="0">remover B</tspan></text>
    <line x1="355" y1="712" x2="690" y2="712" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
    <line x1="690" y1="750" x2="355" y2="750" stroke="#5b6b7b" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-amber)"/>
  </g>
    </g>
    
    <g class="card">
      <rect x="1160" y="340" width="350" height="210" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1160" y="340" width="12" height="210" rx="6" fill="#d8891f"/>
      
      <text x="1196" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#172331" font-weight="800"><tspan x="1196" dy="0">Depois da remoção</tspan></text>
      <text x="1196" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="1196" dy="0">A.Proximo aponta para C e</tspan><tspan x="1196" dy="26.88">C.Anterior aponta para A.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1160" y="590" width="350" height="210" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1160" y="590" width="12" height="210" rx="6" fill="#d8891f"/>
      
      <text x="1196" y="644" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#172331" font-weight="800"><tspan x="1196" dy="0">Casos de borda</tspan></text>
      <text x="1196" y="702" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="1196" dy="0">Se remover o primeiro ou</tspan><tspan x="1196" dy="26.88">último nó, atualize</tspan><tspan x="1196" dy="26.88">início ou fim.</tspan></text>
    </g>
  
  
       
       
       
       
    <line x1="90" y1="1044" x2="1510" y2="1044" stroke="#d8e1ea" stroke-width="2"/>
    <text x="90" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="90" dy="0">Remover exige religar os vizinhos.</tspan></text>
    <text x="1510" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">05 / 07</tspan></text>
  
</svg>