<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Lista encadeada: requisitos de programação">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6957a8"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#6957a8"/>
  <rect y="1112" width="1600" height="18" fill="#6957a8"/>
  
    <rect x="0" y="16" width="470" height="1096" fill="#f1effb"/>
    <rect x="0" y="16" width="36" height="1096" fill="#6957a8"/>
    <rect x="90" y="82" width="280" height="58" rx="18" fill="#ffffff" stroke="#6957a8" stroke-width="2"/>
    <text x="120" y="119" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#6957a8" font-weight="800"><tspan x="120" dy="0">Guia de implementação</tspan></text>
    <text x="90" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="68" fill="#172331" font-weight="900"><tspan x="90" dy="0">Lista encadeada:</tspan><tspan x="90" dy="87.04">requisitos de programação</tspan></text>
    <text x="94" y="386" font-family="Segoe UI, Arial, sans-serif" font-size="31" fill="#5b6b7b"><tspan x="94" dy="0">Como programar inserção no início, no meio e no fim,</tspan><tspan x="94" dy="39.68">além de busca em diferentes posições.</tspan></text>
    <rect x="94" y="520" width="138" height="48" rx="14" fill="#ffffff" stroke="#6957a8" stroke-width="2"/>
      <text x="163" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="163" dy="0">inserção</tspan></text><rect x="262" y="520" width="138" height="48" rx="14" fill="#ffffff" stroke="#6957a8" stroke-width="2"/>
      <text x="331" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="331" dy="0">busca</tspan></text><rect x="430" y="520" width="138" height="48" rx="14" fill="#ffffff" stroke="#6957a8" stroke-width="2"/>
      <text x="499" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="499" dy="0">custo</tspan></text><rect x="598" y="520" width="138" height="48" rx="14" fill="#ffffff" stroke="#6957a8" stroke-width="2"/>
      <text x="667" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="667" dy="0">C#</tspan></text>
    
    <g class="card">
      <rect x="1130" y="150" width="330" height="330" rx="34" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <line x1="1295" y1="315" x2="1225" y2="220" stroke="#6957a8" stroke-width="3" opacity=".55"/><line x1="1295" y1="315" x2="1365" y2="220" stroke="#6957a8" stroke-width="3" opacity=".55"/><line x1="1295" y1="315" x2="1225" y2="414" stroke="#6957a8" stroke-width="3" opacity=".55"/><line x1="1295" y1="315" x2="1365" y2="414" stroke="#6957a8" stroke-width="3" opacity=".55"/>
      <rect x="1219" y="263" width="152" height="104" rx="24" fill="#6957a8"/>
      <text x="1295" y="331" font-family="Segoe UI, Arial, sans-serif" font-size="48" fill="#ffffff" font-weight="900" text-anchor="middle"><tspan x="1295" dy="0">ED</tspan></text>
      <rect x="1165" y="192" width="120" height="56" rx="16" fill="#f1effb" stroke="#6957a8" stroke-width="2"/>
        <text x="1225" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="1225" dy="0">inserção</tspan></text><rect x="1305" y="192" width="120" height="56" rx="16" fill="#f1effb" stroke="#6957a8" stroke-width="2"/>
        <text x="1365" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="1365" dy="0">busca</tspan></text><rect x="1165" y="386" width="120" height="56" rx="16" fill="#f1effb" stroke="#6957a8" stroke-width="2"/>
        <text x="1225" y="422" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="1225" dy="0">custo</tspan></text><rect x="1305" y="386" width="120" height="56" rx="16" fill="#f1effb" stroke="#6957a8" stroke-width="2"/>
        <text x="1365" y="422" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="1365" dy="0">C#</tspan></text>
    </g>
  
    
    <g class="card">
      <rect x="90" y="720" width="430" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="90" y="720" width="12" height="220" rx="6" fill="#6957a8"/>
      
      <text x="126" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="126" dy="0">Estrutura base</tspan></text>
      <text x="126" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="126" dy="0">A lista guarda início, fim e</tspan><tspan x="126" dy="29.44">tamanho para controlar a</tspan><tspan x="126" dy="29.44">sequência de nós.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="575" y="720" width="430" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="575" y="720" width="12" height="220" rx="6" fill="#6957a8"/>
      
      <text x="611" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="611" dy="0">Operações</tspan></text>
      <text x="611" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="611" dy="0">Inserir no início, inserir no</tspan><tspan x="611" dy="29.44">meio, inserir no fim e buscar</tspan><tspan x="611" dy="29.44">valores.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1060" y="720" width="430" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1060" y="720" width="12" height="220" rx="6" fill="#6957a8"/>
      
      <text x="1096" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="1096" dy="0">Regra geral</tspan></text>
      <text x="1096" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="1096" dy="0">Como cada nó aponta só para o</tspan><tspan x="1096" dy="29.44">próximo, várias operações</tspan><tspan x="1096" dy="29.44">caminham desde o início.</tspan></text>
    </g>
  
  
</svg>