      <text x="1196" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="1196" dy="0">atual começa em inicio.</tspan><tspan x="1196" dy="26.88">atual.Valor já é o valor</tspan><tspan x="1196" dy="26.88">procurado.</tspan></text>
