<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Novo nó vira o primeiro">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6957a8"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#6957a8"/>
  <rect y="1112" width="1600" height="18" fill="#6957a8"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#6957a8" font-weight="700"><tspan x="90" dy="0">INSERIR NO INÍCIO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Novo nó vira o primeiro</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">É o caso mais simples: não precisa percorrer a lista.</tspan></text>
  
       
       
       
      
    <g class="card">
      <rect x="90" y="315" width="860" height="625" rx="20" fill="#18222f"/>
      <rect x="90" y="315" width="860" height="76" rx="20" fill="#6957a8"/>
      <rect x="90" y="361" width="860" height="30" fill="#6957a8"/>
      <text x="124" y="363" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#ffffff" font-weight="800"><tspan x="124" dy="0">InserirInicio</tspan></text>
      <rect x="114" y="408" width="812" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="431" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">public void InserirInicio(int valor)</tspan></text><text x="128" y="464.35" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">{</tspan></text><rect x="114" y="474.7" width="812" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="497.7" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">No novo = new No(valor);</tspan></text><text x="128" y="531.05" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">novo.Prox = inicio;</tspan></text><rect x="114" y="541.4" width="812" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="564.4" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">inicio = novo;</tspan></text><text x="128" y="597.75" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"></text><rect x="114" y="608.1" width="812" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="631.1" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">if (fim == null)</tspan></text><text x="128" y="664.45" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">fim = novo;</tspan></text><rect x="114" y="674.8" width="812" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="697.8" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"></text><text x="128" y="731.1500000000001" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">tamanho++;</tspan></text><rect x="114" y="741.5" width="812" height="37.35" rx="6" fill="#263445" opacity=".72"/><text x="128" y="764.5" font-family="Consolas, Menlo, monospace" font-size="23" fill="#eef6ff"><tspan x="128" dy="0">}</tspan></text>
    </g>
  
      <g class="card">
        <rect x="1010" y="315" width="500" height="250" rx="20" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
        <g style="--accent:#6957a8">
    <text x="1125" y="347" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#6957a8" font-weight="800" text-anchor="middle"><tspan x="1125" dy="0">novo</tspan></text>
    <rect x="1055" y="392" width="145" height="96" rx="18" fill="#f1effb" stroke="#6957a8" stroke-width="3"/>
    <text x="1111.5" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="1111.5" dy="0">5</tspan></text>
    <line x1="1155" y1="408" x2="1155" y2="472" stroke="#d8e1ea" stroke-width="2"/>
       <text x="1178" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="1178" dy="0">prox</tspan></text>
    <line x1="1200" y1="440" x2="1265" y2="440" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
    <rect x="1280" y="392" width="145" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="1336.5" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="1336.5" dy="0">10</tspan></text>
    <line x1="1380" y1="408" x2="1380" y2="472" stroke="#d8e1ea" stroke-width="2"/>
       <text x="1403" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="1403" dy="0">prox</tspan></text>
        <line x1="1425" y1="440" x2="1478" y2="440" stroke="#5b6b7b" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-muted)"/><rect x="1495" y="392" width="145" height="96" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="3"/>
    <text x="1551.5" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#172331" font-weight="900" text-anchor="middle"><tspan x="1551.5" dy="0">20</tspan></text>
    <line x1="1595" y1="408" x2="1595" y2="472" stroke="#d8e1ea" stroke-width="2"/>
       <text x="1618" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b7b" text-anchor="middle"><tspan x="1618" dy="0">prox</tspan></text>
        
    <text x="1065" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="1065" dy="0">novo.Prox recebe o antigo início</tspan></text>
  </g>
      </g>
      
    <g class="card">
      <rect x="1010" y="610" width="500" height="130" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1010" y="610" width="12" height="130" rx="6" fill="#6957a8"/>
      
      <text x="1046" y="664" font-family="Segoe UI, Arial, sans-serif" font-size="25" fill="#172331" font-weight="800"><tspan x="1046" dy="0">Passos</tspan></text>
      <text x="1046" y="722" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5b6b7b"><tspan x="1046" dy="0">Criar o nó, ligar novo.Prox ao antigo</tspan><tspan x="1046" dy="25.6">início e atualizar início.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1010" y="770" width="500" height="130" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1010" y="770" width="12" height="130" rx="6" fill="#6957a8"/>
      
      <text x="1046" y="824" font-family="Segoe UI, Arial, sans-serif" font-size="25" fill="#172331" font-weight="800"><tspan x="1046" dy="0">Custo</tspan></text>
      <text x="1046" y="882" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5b6b7b"><tspan x="1046" dy="0">O(1), porque não depende da quantidade de</tspan><tspan x="1046" dy="25.6">nós.</tspan></text>
    </g>
  
    
       
       
       
    <line x1="90" y1="1044" x2="1510" y2="1044" stroke="#d8e1ea" stroke-width="2"/>
    <text x="90" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="90" dy="0">Inserção no início: custo constante.</tspan></text>
    <text x="1510" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">03 / 10</tspan></text>
  
</svg>