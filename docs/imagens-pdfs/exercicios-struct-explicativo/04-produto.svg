          <text x="890" y="694" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#5b6b7b"><tspan x="890" dy="0">AplicarCupomDescontoPorcentagem(percentual)</tspan></text><circle cx="860" cy="733" r="10" fill="#fff0ed" stroke="#c94f45" stroke-width="2"/>
