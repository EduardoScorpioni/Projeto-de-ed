    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#c94f45" font-weight="700"><tspan x="90" dy="0">EXERCÍCIO C</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Produto</tspan></text>
