      <text x="126" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="126" dy="0">Objetivo</tspan></text>
      <text x="126" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="126" dy="0">Criar uma struct para cada</tspan><tspan x="126" dy="29.44">contexto, escolhendo dados</tspan><tspan x="126" dy="29.44">coerentes e operações</tspan><tspan x="126" dy="29.44">adequadas.</tspan></text>
