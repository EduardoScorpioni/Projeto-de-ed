      <text x="1096" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="1096" dy="0">Use cada contexto como um</tspan><tspan x="1096" dy="29.44">pequeno TAD: dados + operações</tspan><tspan x="1096" dy="29.44">+ teste no Main.</tspan></text>
