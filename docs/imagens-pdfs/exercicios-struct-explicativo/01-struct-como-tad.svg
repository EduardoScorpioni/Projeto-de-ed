      <text x="611" y="774" font-family="Segoe UI, Arial, sans-serif" font-size="29" fill="#172331" font-weight="800"><tspan x="611" dy="0">Entrega</tspan></text>
      <text x="611" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="611" dy="0">Criar repositório Git, fazer</tspan><tspan x="611" dy="29.44">commits por exercício e enviar</tspan><tspan x="611" dy="29.44">o link na tarefa.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1060" y="720" width="430" height="220" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
