<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" role="img" aria-label="Como resolver cada exercício">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c94f45"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8891f"/>
    </marker>
    <style>
      .card { filter: url(#shadow); }
      .small-caps { letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1600" height="1130" fill="#fbfcff"/>
  <rect width="1600" height="16" fill="#c94f45"/>
  <rect y="1112" width="1600" height="18" fill="#c94f45"/>
  
    <text x="90" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#c94f45" font-weight="700"><tspan x="90" dy="0">DICA DE IMPLEMENTAÇÃO</tspan></text>
    <text x="1510" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">Grupo 6 | Estrutura de Dados</tspan></text>
    <text x="90" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="#172331" font-weight="800"><tspan x="90" dy="0">Como resolver cada exercício</tspan></text>
    <text x="94" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#5b6b7b"><tspan x="94" dy="0">Use o mesmo roteiro para todos os contextos e mantenha commits pequenos.</tspan></text>
  
       
       
       
       
    <g class="card">
      <rect x="90" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="90" y="390" width="12" height="360" rx="6" fill="#c94f45"/>
      <circle cx="361" cy="438" r="24" fill="#fff0ed" stroke="#c94f45" stroke-width="2"/>
       <text x="361" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#c94f45" font-weight="800" text-anchor="middle"><tspan x="361" dy="0">1</tspan></text>
      <text x="126" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="126" dy="0">1. Campos</tspan></text>
      <text x="126" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="126" dy="0">Liste todos os dados</tspan><tspan x="126" dy="29.44">antes de programar a</tspan><tspan x="126" dy="29.44">struct.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="455" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="455" y="390" width="12" height="360" rx="6" fill="#c94f45"/>
      <circle cx="726" cy="438" r="24" fill="#fff0ed" stroke="#c94f45" stroke-width="2"/>
       <text x="726" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#c94f45" font-weight="800" text-anchor="middle"><tspan x="726" dy="0">2</tspan></text>
      <text x="491" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="491" dy="0">2. Métodos</tspan></text>
      <text x="491" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="491" dy="0">Crie uma função para</tspan><tspan x="491" dy="29.44">cada operação pedida.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="820" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="820" y="390" width="12" height="360" rx="6" fill="#c94f45"/>
      <circle cx="1091" cy="438" r="24" fill="#fff0ed" stroke="#c94f45" stroke-width="2"/>
       <text x="1091" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#c94f45" font-weight="800" text-anchor="middle"><tspan x="1091" dy="0">3</tspan></text>
      <text x="856" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="856" dy="0">3. Teste</tspan></text>
      <text x="856" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="856" dy="0">No Main, preencha a</tspan><tspan x="856" dy="29.44">struct e chame todos</tspan><tspan x="856" dy="29.44">os métodos.</tspan></text>
    </g>
  
    <g class="card">
      <rect x="1185" y="390" width="325" height="360" rx="18" fill="#ffffff" stroke="#d8e1ea" stroke-width="2"/>
      <rect x="1185" y="390" width="12" height="360" rx="6" fill="#c94f45"/>
      <circle cx="1456" cy="438" r="24" fill="#fff0ed" stroke="#c94f45" stroke-width="2"/>
       <text x="1456" y="447" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#c94f45" font-weight="800" text-anchor="middle"><tspan x="1456" dy="0">4</tspan></text>
      <text x="1221" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#172331" font-weight="800"><tspan x="1221" dy="0">4. Commit</tspan></text>
      <text x="1221" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#5b6b7b"><tspan x="1221" dy="0">Faça commits</tspan><tspan x="1221" dy="29.44">separados, por</tspan><tspan x="1221" dy="29.44">exemplo:</tspan><tspan x="1221" dy="29.44">exercicio-jogador e</tspan><tspan x="1221" dy="29.44">exercicio-produto.</tspan></text>
    </g>
  
       
       
    <line x1="90" y1="1044" x2="1510" y2="1044" stroke="#d8e1ea" stroke-width="2"/>
    <text x="90" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b"><tspan x="90" dy="0">Roteiro visual para explicar a lista no site.</tspan></text>
    <text x="1510" y="1082" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5b6b7b" text-anchor="end"><tspan x="1510" dy="0">06 / 06</tspan></text>
  
</svg>